name: Build RustDesk Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$PWD\vcpkg" >> $env:GITHUB_ENV

      - name: Set fixed password
        run: |
          echo "#![allow(unused)]">src/password.rs
          echo "pub const PASSWORD: &str = `"Tita567575675`;">>src/password.rs

      - name: Build release
        run: cargo build --release --features "inline"

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: target/release/rustdesk.exe
